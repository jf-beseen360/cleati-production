name: CLEATI V3.3 - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Tests & Validation
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run I18n validation tests
        run: |
          python -m pytest cleati/i18n/tests/test_language_separation.py -v --tb=short

      - name: Validate I18n configuration
        run: |
          python3 << 'EOF'
          import json
          import os

          config = json.load(open('cleati/i18n/config.json'))

          # Check languages
          assert len(config['languages']) == 8, "Must have 8 languages"

          # Check translation files
          total = 0
          for lang in config['languages'].keys():
              for ns in config['supportedNamespaces']:
                  path = f"cleati/i18n/translations/{lang}/{ns}.json"
                  assert os.path.exists(path), f"Missing {path}"
                  total += 1

          assert total == 40, f"Expected 40 translation files, got {total}"
          print("✓ I18n configuration validated")
          EOF

      - name: Check code quality
        run: |
          python -m pylint cleati_production_api_v3_i18n.py --disable=all --enable=E,F || true

  # Job 2: Build Docker Image
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Security Scan
  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 4: Deploy to Staging (on develop branch)
  deploy-staging:
    needs: [test, build, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging..."
          # Add your staging deployment commands here
          # Example: kubectl set image deployment/cleati-staging cleati=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          echo "✓ Staging deployment would occur here"

      - name: Run smoke tests on staging
        run: |
          echo "Running smoke tests on staging..."
          sleep 5
          curl -f http://localhost:8000/api/v3/health || echo "Staging endpoint not yet accessible"

  # Job 5: Deploy to Production (on main branch)
  deploy-production:
    needs: [test, build, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.cleati.com

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to production environment
        run: |
          echo "🚀 Starting production deployment..."
          # Add your production deployment commands here
          # Example: kubectl set image deployment/cleati cleati=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          echo "✓ Production deployment would occur here"

      - name: Health check
        run: |
          echo "Verifying production deployment..."
          # Add health check commands
          echo "✓ Production health check passed"

      - name: Notify deployment
        if: success()
        run: |
          echo "✓ Production deployment successful"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠ Rolling back production deployment..."
          # Add rollback commands here
